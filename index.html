<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NimeStream - Nonton Anime Subtitle Indonesia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A24;
            --secondary: #7B2CBF;
            --bg-dark: #0a0a0f;
            --bg-card: #141420;
            --bg-card-hover: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #00D9FF;
            --gradient-1: linear-gradient(135deg, #FF6B35 0%, #FF8E53 100%);
            --gradient-2: linear-gradient(135deg, #7B2CBF 0%, #9D4EDD 100%);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            --header-height: 60px;
            --bottom-nav-height: 65px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: var(--bottom-nav-height);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, rgba(20, 20, 32, 0.98) 0%, rgba(10, 10, 15, 0.95) 100%);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--header-height);
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            flex-shrink: 0;
        }

        .logo i {
            font-size: 24px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span span {
            color: var(--primary);
        }

        /* Desktop Navigation */
        .nav {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .nav a:hover, .nav a.active {
            color: var(--text-primary);
            background: rgba(255, 107, 53, 0.15);
        }

        .nav a.active {
            color: var(--primary);
            background: rgba(255, 107, 53, 0.2);
        }

        /* Search */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 6px 15px;
            width: 180px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.2);
            width: 220px;
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 13px;
            width: 100%;
            padding-left: 8px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
        }

        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
            margin: -8px;
        }

        /* Main Content */
        .main {
            padding-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 420px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
        }

        .hero-slider {
            position: relative;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.6) 50%, rgba(10,10,15,0.3) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .hero-info {
            max-width: 100%;
        }

        .hero-badge {
            display: inline-block;
            background: var(--gradient-1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hero-meta i {
            color: var(--primary);
            font-size: 12px;
        }

        .hero-description {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            min-height: 44px;
            min-width: 44px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
        }

        .btn-primary:active {
            transform: scale(0.98);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-accent {
            background: var(--gradient-2);
            color: white;
        }

        /* Hero Navigation */
        .hero-nav {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .hero-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            border: none;
        }

        .hero-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }

        /* Sections */
        .section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .section-title i {
            color: var(--primary);
        }

        .section-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
            padding: 8px 12px;
            border-radius: 15px;
            background: transparent;
            border: none;
            cursor: pointer;
        }

        .section-link:hover {
            color: var(--primary);
            background: rgba(255, 107, 53, 0.1);
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .anime-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .anime-card:active {
            transform: scale(0.98);
        }

        .anime-card-poster {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg-card-hover);
        }

        .anime-card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .anime-card:hover .anime-card-poster img {
            transform: scale(1.05);
        }

        .anime-card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--primary);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .anime-card-badge.ongoing {
            background: #22c55e;
        }

        .anime-card-badge.completed {
            background: var(--secondary);
        }

        .anime-card-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.75);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .anime-card-rating i {
            color: #fbbf24;
            font-size: 9px;
        }

        .anime-card-info {
            padding: 12px 10px;
        }

        .anime-card-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text-primary);
        }

        .anime-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .anime-card-meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* Genre Pills */
        .genre-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .genre-pill {
            background: var(--bg-card);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .genre-pill:hover, .genre-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .genre-pill:active {
            transform: scale(0.95);
        }

        /* Schedule */
        .schedule-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .schedule-day {
            min-width: 260px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        .schedule-day-header {
            background: var(--gradient-1);
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
            position: sticky;
            left: 0;
        }

        .schedule-day-content {
            padding: 12px;
        }

        .schedule-item {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s;
            cursor: pointer;
            min-height: 60px;
        }

        .schedule-item:hover {
            background: var(--bg-card-hover);
        }

        .schedule-item:active {
            background: rgba(255, 107, 53, 0.2);
        }

        .schedule-item-poster {
            width: 45px;
            height: 60px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-card-hover);
        }

        .schedule-item-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .schedule-item-info {
            flex: 1;
            min-width: 0;
        }

        .schedule-item-info h4 {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .schedule-item-info span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination button:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination button:active {
            transform: scale(0.95);
        }

        .pagination button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 40px 15px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Detail Page */
        .detail-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .detail-hero {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-poster {
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .detail-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .detail-info {
            flex: 1;
        }

        .detail-badge {
            display: inline-block;
            background: var(--gradient-1);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 800;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .detail-title-jp {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 15px;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 15px;
        }

        .detail-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .detail-meta-item i {
            color: var(--primary);
            font-size: 12px;
        }

        .detail-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 20px;
        }

        .detail-genre {
            background: var(--bg-card);
            padding: 8px 14px;
            border-radius: 18px;
            font-size: 12px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
        }

        .detail-genre:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .detail-genre:active {
            transform: scale(0.95);
        }

        .detail-synopsis {
            margin-bottom: 25px;
        }

        .detail-synopsis h3 {
            font-size: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .detail-synopsis h3 i {
            color: var(--primary);
        }

        .detail-synopsis p {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 13px;
        }

        /* Episode List */
        .episode-list {
            background: var(--bg-card);
            border-radius: 12px;
            padding: 20px 15px;
            margin-bottom: 25px;
        }

        .episode-list h3 {
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .episode-list h3 i {
            color: var(--primary);
        }

        .episode-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        .episode-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: var(--bg-card-hover);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            min-height: 50px;
        }

        .episode-item:hover {
            background: rgba(255, 107, 53, 0.2);
        }

        .episode-item:active {
            background: var(--primary);
        }

        .episode-number {
            width: 40px;
            height: 40px;
            background: var(--gradient-1);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .episode-info {
            flex: 1;
            min-width: 0;
        }

        .episode-info h4 {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 2px;
        }

        .episode-info span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .episode-item:hover .episode-info span,
        .episode-item:active .episode-info span {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Batch Download */
        .batch-download {
            background: var(--gradient-2);
            border-radius: 12px;
            padding: 20px 15px;
            margin-bottom: 25px;
        }

        .batch-download h3 {
            font-size: 16px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .batch-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .batch-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 16px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s;
            min-height: 44px;
        }

        .batch-link:hover {
            background: rgba(255, 255, 255, 0.25);
        }

        .batch-link:active {
            transform: scale(0.95);
        }

        /* ========== VIDEO PLAYER SECTION ========== */
        .episode-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 15px;
        }

        .episode-player {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        /* Video Container */
        .video-container {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
        }

        .video-container iframe,
        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        .video-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a2e 100%);
            color: var(--text-secondary);
            gap: 15px;
            padding: 20px;
            text-align: center;
        }

        .video-placeholder i {
            font-size: 60px;
            color: var(--primary);
            opacity: 0.7;
        }

        /* Watch Button - Full Width */

        /* Download Section */

        /* Episode Navigation */

        /* Responsive */

</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="#" class="logo" id="logoBtn">
                <i class="fas fa-play-circle"></i>
                <span>Nime<span>Stream</span></span>
            </a>
            
            <nav class="nav" id="desktopNav">
                <a href="#" class="nav-link active" data-page="home">Home</a>
                <a href="#" class="nav-link" data-page="ongoing">Sedang Tayang</a>
                <a href="#" class="nav-link" data-page="completed">Tamat</a>
                <a href="#" class="nav-link" data-page="schedule">Jadwal Rilis</a>
                <a href="#" class="nav-link" data-page="genres">Genre</a>
            </nav>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari anime..." autocomplete="off">
                    <button type="button" id="clearSearch" style="display: none;">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>

            <button class="mobile-menu-btn" id="mobileMenuBtn">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="mainContent">
        <!-- Content will be loaded dynamically -->
    </main>

    <!-- Mobile Bottom Navigation -->
    <nav class="mobile-nav" id="mobileNav">
        <div class="mobile-nav-items">
            <button class="mobile-nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>
            <button class="mobile-nav-item" data-page="ongoing">
                <i class="fas fa-play-circle"></i>
                <span>Tayang</span>
            </button>
            <button class="mobile-nav-item" data-page="completed">
                <i class="fas fa-check-circle"></i>
                <span>Tamat</span>
            </button>
            <button class="mobile-nav-item" data-page="schedule">
                <i class="fas fa-calendar"></i>
                <span>Jadwal</span>
            </button>
            <button class="mobile-nav-item" data-page="genres">
                <i class="fas fa-tags"></i>
                <span>Genre</span>
            </button>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Pesan notifikasi</span>
    </div>

    <script>
        // API Base URL
        const API_BASE = 'https://www.sankavollerei.web.id/anime';

        // Current State
        let currentPage = 'home';
        let currentAnimeSlug = null;
        let currentEpisodeSlug = null;
        let currentGenreSlug = null;
        let currentType = null;
        let page = 1;
        let homeData = null;
        let searchTimeout = null;
        let currentSlide = 0;
        let heroInterval = null;
        let currentStreamUrl = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHome();
            setupNavigation();
            setupSearch();
        });

        // Setup Navigation
        function setupNavigation() {
            // Desktop Nav
            const desktopNav = document.getElementById('desktopNav');
            desktopNav.addEventListener('click', (e) => {
                const link = e.target.closest('.nav-link');
                if (link) {
                    e.preventDefault();
                    const page = link.dataset.page;
                    navigateTo(page);
                }
            });

            // Mobile Nav
            const mobileNav = document.getElementById('mobileNav');
            mobileNav.addEventListener('click', (e) => {
                const item = e.target.closest('.mobile-nav-item');
                if (item) {
                    const page = item.dataset.page;
                    navigateTo(page);
                }
            });

            // Logo
            document.getElementById('logoBtn').addEventListener('click', (e) => {
                e.preventDefault();
                navigateTo('home');
            });
        }

        // Navigate To
        function navigateTo(page) {
            switch(page) {
                case 'home':
                    loadHome();
                    break;
                case 'ongoing':
                    showOngoing();
                    break;
                case 'completed':
                    showCompleted();
                    break;
                case 'schedule':
                    showSchedule();
                    break;
                case 'genres':
                    showGenres();
                    break;
                default:
                    loadHome();
            }
        }

        // Update Navigation Active State
        function updateNav(page) {
            currentPage = page;
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });

            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.dataset.page === page) {
                    item.classList.add('active');
                }
            });
        }

        // Setup Search
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');
            const clearSearch = document.getElementById('clearSearch');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                
                clearTimeout(searchTimeout);
                clearSearch.style.display = query ? 'block' : 'none';
                
                if (query.length < 2) {
                    searchResults.classList.remove('show');
                    return;
                }

                searchTimeout = setTimeout(() => {
                    searchAnime(query);
                }, 500);
            });

            searchInput.addEventListener('focus', () => {
                if (searchInput.value.length >= 2) {
                    searchResults.classList.add('show');
                }
            });

            clearSearch.addEventListener('click', () => {
                searchInput.value = '';
                clearSearch.style.display = 'none';
                searchResults.classList.remove('show');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    searchResults.classList.remove('show');
                }
            });
        }

        // Search Anime
        async function searchAnime(query) {
            const searchResults = document.getElementById('searchResults');
            
            try {
                const response = await fetch(`${API_BASE}/search/${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.ok && data.data.animeList && data.data.animeList.length > 0) {
                    let html = '';
                    data.data.animeList.forEach(anime => {
                        html += `
                            <div class="search-result-item" data-slug="${anime.animeId}">
                                <div class="search-result-poster">
                                    <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/40x55/141420/a0a0b0?text=No'">
                                </div>
                                <div class="search-result-info">
                                    <h4>${anime.title}</h4>
                                    <span>${anime.status || ''} ${anime.score ? '• ' + anime.score : ''}</span>
                                </div>
                            </div>
                        `;
                    });
                    searchResults.innerHTML = html;
                    searchResults.classList.add('show');

                    searchResults.querySelectorAll('.search-result-item').forEach(item => {
                        item.addEventListener('click', () => {
                            goToAnime(item.dataset.slug);
                            searchResults.classList.remove('show');
                            searchInput.value = '';
                            clearSearch.style.display = 'none';
                        });
                    });
                } else {
                    searchResults.innerHTML = '<div class="no-results">Tidak ada hasil</div>';
                    searchResults.classList.add('show');
                }
            } catch (error) {
                console.error('Search error:', error);
                searchResults.innerHTML = '<div class="no-results">Terjadi kesalahan</div>';
                searchResults.classList.add('show');
            }
        }

        // Fetch Data
        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { ok: false, message: 'Terjadi kesalahan koneksi' };
            }
        }

        // Load Home
        async function loadHome() {
            updateNav('home');
            showLoading();

            const data = await fetchAPI('/home');
            
            if (data.ok) {
                homeData = data.data;
                renderHome(data.data);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Render Home
        function renderHome(data) {
            const mainContent = document.getElementById('mainContent');
            
            const heroAnime = data.ongoing.animeList.slice(0, 5);
            let heroHtml = `
                <section class="hero">
                    <div class="hero-slider" id="heroSlider">
                        ${heroAnime.map((anime, i) => `
                            <div class="hero-slide ${i === 0 ? 'active' : ''}" data-index="${i}" data-slug="${anime.animeId}">

        // Setup Hero Slider
        function setupHeroSlider(animeList) {
            if (heroInterval) clearInterval(heroInterval);
            
            currentSlide = 0;
            
            heroInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % animeList.length;
                goToSlide(currentSlide, animeList);
            }, 5000);
        }

        // Go to Slide
        function goToSlide(index, animeList) {
            const dots = document.querySelectorAll('.hero-dot');
            const slides = document.querySelectorAll('.hero-slide');
            const heroTitle = document.getElementById('heroTitle');
            const heroMeta = document.querySelector('.hero-meta');
            const heroAction = document.querySelector('.hero-actions button');

            if (!dots.length || !slides.length) return;

            dots.forEach(dot => dot.classList.remove('active'));
            slides.forEach(slide => slide.classList.remove('active'));

            if (dots[index]) dots[index].classList.add('active');
            if (slides[index]) slides[index].classList.add('active');

            if (animeList && animeList[index]) {
                const anime = animeList[index];
                if (heroTitle) heroTitle.textContent = anime.title;
                if (heroMeta) {
                    heroMeta.innerHTML = `
                        <span><i class="fas fa-film"></i> ${anime.episodes} Episode</span>
                        <span><i class="fas fa-clock"></i> ${anime.releaseDay}</span>
                        <span><i class="fas fa-calendar"></i> ${anime.latestReleaseDate}</span>
                    `;
                }
                if (heroAction) heroAction.dataset.slug = anime.animeId;
            }
        }

        // Setup Anime Cards
        function setupAnimeCards() {
            document.querySelectorAll('.anime-card').forEach(card => {
                card.addEventListener('click', () => {
                    if (card.dataset.slug) {
                        goToAnime(card.dataset.slug);
                    }
                });
            });
        }

        // Render Anime Card
        function renderAnimeCard(anime, type = '') {
            const status = anime.status || type;
            const badge = status === 'Ongoing' || type === 'ongoing' ? 'ongoing' : 'completed';
            const badgeText = badge === 'ongoing' ? 'Ongoing' : 'Tamat';
            
            return `
                <div class="anime-card" data-slug="${anime.animeId}">
                    <div class="anime-card-poster">
                        <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/180x240/141420/a0a0b0?text=No+Image'">
                        <span class="anime-card-badge ${badge}">${badgeText}</span>
                        ${anime.score ? `<span class="anime-card-rating"><i class="fas fa-star"></i> ${anime.score}</span>` : ''}
                    </div>
                    <div class="anime-card-info">
                        <h3 class="anime-card-title">${anime.title}</h3>
                        <div class="anime-card-meta">
                            <span><i class="fas fa-film"></i> ${anime.episodes || '?'} Ep</span>
                            ${anime.releaseDay ? `<span><i class="fas fa-calendar"></i> ${anime.releaseDay}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Show Ongoing Anime
        async function showOngoing() {
            updateNav('ongoing');
            currentType = 'ongoing';
            page = 1;
            showLoading();

            const data = await fetchAPI(`/ongoing-anime?page=${page}`);
            
            if (data.ok) {
                renderAnimeListPage(data.data.animeList, 'Anime Sedang Tayang', 'ongoing', data.pagination);
            } else {
                showError(data.message || 'Gagal memuat data');

        // Show Completed Anime
        async function showCompleted() {
            updateNav('completed');
            currentType = 'completed';
            page = 1;
            showLoading();

            const data = await fetchAPI(`/complete-anime?page=${page}`);
            
            if (data.ok) {
                renderAnimeListPage(data.data.animeList, 'Anime Tamat', 'completed', data.pagination);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Show Schedule
        async function showSchedule() {
            updateNav('schedule');
            showLoading();

            const data = await fetchAPI('/schedule');
            
            if (data.ok) {
                renderSchedule(data.data);
            } else {
                showError(data.message || 'Gagal memuat data');

        // Render Schedule
        function renderSchedule(schedule) {
            const mainContent = document.getElementById('mainContent');
            
            const dayOrder = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
            const sortedSchedule = [...schedule].sort((a, b) => 
                dayOrder.indexOf(a.day) - dayOrder.indexOf(b.day)
            );

            const today = new Date();
            const todayDay = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][today.getDay()];

            let html = `
                <section class="page-header">
                    <h1><i class="fas fa-calendar-alt"></i> Jadwal Rilis Anime</h1>
                    <p>Daftar anime yang dirilis setiap harinya</p>
                </section>
                <section class="section" style="padding-top: 0;">
                    <div class="schedule-container">
                        ${sortedSchedule.map(day => `
                            <div class="schedule-day" ${day.day === todayDay ? 'style="border: 2px solid var(--primary);"' : ''}>
                                <div class="schedule-day-header">
                                    ${day.day} ${day.day === todayDay ? '(Hari Ini)' : ''}
                                </div>
                                <div class="schedule-day-content">
                                    ${day.anime_list.map(anime => `
                                        <div class="schedule-item" data-slug="${anime.slug}">
                                            <div class="schedule-item-poster">
                                                <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/45x60/141420/a0a0b0?text=No'">
                                            </div>
                                            <div class="schedule-item-info">
                                                <h4>${anime.title}</h4>
                                                <span>Klik untuk detail</span>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();

            document.querySelectorAll('.schedule-item').forEach(item => {
                item.addEventListener('click', () => {
                    if (item.dataset.slug) {
                        goToAnime(item.dataset.slug);
                    }
                });
            });
        }

        async function showGenres() {
            updateNav('genres');

            if (data.ok) {
                renderGenres(data.data.genreList);

                showError(data.message || 'Gagal memuat data');

        async function showGenreAnime(genreId, genreTitle) {
            updateNav('genres');

        // Render Anime List Page
        function renderAnimeListPage(animeList, title, type, pagination = null) {
            const mainContent = document.getElementById('mainContent');
            
            let html = `
                <section class="page-header">
                    <h1><i class="fas fa-film"></i> ${title}</h1>
                    <p>Ditemukan ${animeList.length} anime</p>
                </section>
                <section class="section" style="padding-top: 0;">
                    <div class="anime-grid" id="animeListGrid">
                        ${animeList.map(anime => renderAnimeCard(anime)).join('')}
                    </div>
                    ${pagination ? renderPagination(pagination) : ''}
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
            
            setupAnimeCards();
        }

        // Render Pagination
        function renderPagination(pagination) {
            if (!pagination) return '';

            const hasNext = pagination.hasNextPage || pagination.totalPages > 1;
            const totalPages = pagination.totalPages || 1;
            
            return `
                <div class="pagination">
                    <button onclick="loadPage(${page - 1})" ${page <= 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i> Prev
                    </button>
                    <span style="padding: 10px 15px; color: var(--text-secondary); font-size: 13px;">
                        Halaman ${page} / ${totalPages}
                    </span>
                    <button onclick="loadPage(${page + 1})" ${!hasNext ? 'disabled' : ''}>
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            `;
        }

        // Load Page
        async function loadPage(pageNum) {
            if (pageNum < 1) return;
            
            page = pageNum;
            showLoading();

            let endpoint = '';
            if (currentType === 'ongoing') {
                endpoint = `/ongoing-anime?page=${page}`;
            } else if (currentType === 'completed') {
                endpoint = `/complete-anime?page=${page}`;
            } else if (currentPage === 'genre') {
                endpoint = `/genre/${currentGenreSlug}?page=${page}`;
            }

            if (!endpoint) return;

            const data = await fetchAPI(endpoint);
            
            if (data.ok) {
                const title = currentType === 'ongoing' ? 'Anime Sedang Tayang' : 
                              currentType === 'completed' ? 'Anime Tamat' : 'Anime';
                renderAnimeListPage(data.data.animeList, title, currentType, data.pagination);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Go to Anime Detail
        async function goToAnime(animeId) {
            showLoading();

            const data = await fetchAPI(`/anime/${animeId}`);
            
            if (data.ok) {
                renderAnimeDetail(data.data);
            } else {
                showError(data.message || 'Anime tidak ditemukan');
            }
        }

                                ${anime.duration ? `<div class="detail-meta-item"><i class="fas fa-clock"></i> ${anime.duration}</div>` : ''}
                                ${anime.aired ? `<div class="detail-meta-item"><i class="fas fa-calendar"></i> ${anime.aired}</div>` : ''}

                            <div class="hero-actions">

                                        <i class="fas fa-play"></i> Nonton Episode 1
                                    </button>
                                ` : ''}
                                <button class="btn btn-secondary" onclick="window.scrollTo({ top: 0, behavior: 'smooth' });">
                                    <i class="fas fa-arrow-up"></i> Ke Atas
                                </button>
                            </div>
                        </div>
                    </div>

                    ${anime.episodeList && anime.episodeList.length > 0 ? `
                        <div class="episode-list">
                            <h3><i class="fas fa-list"></i> Daftar Episode (${anime.episodeList.length})</h3>
                            <div class="episode-grid" id="episodeGrid">
                                ${anime.episodeList.map(ep => `
                                    <div class="episode-item" data-episode="${ep.episodeId}">
                                        <div class="episode-number">${ep.eps}</div>
                                        <div class="episode-info">
                                            <h4>Episode ${ep.eps}</h4>
                                            <span>${ep.date}</span>
                                        </div>

                                `).join('')}

                        </div>

                    ${batchHtml}

                    ${anime.recommendedAnimeList && anime.recommendedAnimeList.length > 0 ? `

            mainContent.innerHTML = html + renderFooter();

                    showGenreAnime(btn.dataset.genreId, btn.dataset.genreTitle);

        // Render Episode Page

            const mainContent = document.getElementById('mainContent');
            currentStreamUrl = episode.defaultStreamingUrl || null;
            
            // Server list
            let serverHtml = '<div class="server-section">';
            if (episode.server && episode.server.qualities) {
                episode.server.qualities.forEach(quality => {
                    serverHtml += `

                                    <button class="server-btn" 
                                            data-server-id="${server.serverId}" 
                                            data-server-title="${server.title.trim()}"
                                            data-quality="${quality.title}">
                                        <i class="fas fa-play-circle"></i> ${server.title.trim()}
                                    </button>
                                `).join('')}
                            </div>
                        </div>

            serverHtml += '</div>';

                episode.downloadUrl.qualities.forEach(quality => {
                    downloadHtml += `
                        <div class="download-quality">

                                <h4>${quality.title}</h4>

                            </div>

                                ${quality.urls.map(url => `
                                    <a href="${url.url}" target="_blank" class="download-btn">
                                        <i class="fas fa-download"></i> ${url.title}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            }
            downloadHtml += '</div>';

            // Navigation buttons
            let prevBtn = episode.hasPrevEpisode ? 
                `<button class="episode-nav-btn" data-episode="${episode.prevEpisode.episodeId}">
                    <i class="fas fa-chevron-left"></i> Prev
                </button>` : 
                `<span class="episode-nav-btn disabled"><i class="fas fa-chevron-left"></i> Prev</span>`;

            let nextBtn = episode.hasNextEpisode ?
                `<button class="episode-nav-btn" data-episode="${episode.nextEpisode.episodeId}">
                    Next <i class="fas fa-chevron-right"></i>
                </button>` :
                `<span class="episode-nav-btn disabled">Next <i class="fas fa-chevron-right"></i></span>`;

            let html = `
                <section class="episode-page">
                    <!-- Episode Navigation -->
                    <div class="episode-nav">
                        ${prevBtn}

                            ` : `
                                <div class="video-placeholder">
                                    <i class="fas fa-film"></i>
                                    <h3>Pilih Server Streaming</h3>
                                    <p>Klik tombol "Tonton Sekarang" di bawah atau pilih server untuk mulai menonton</p>
                                </div>
                            `}
                        </div>
                        
                        <!-- Watch Button -->
                        <div class="watch-btn-container">
                            <button class="watch-btn-large" id="watchBtn">
                                <i class="fas fa-play"></i> 
                                Tonton Sekarang
                            </button>
                        </div>

                        <!-- Player Controls -->

                            <div class="player-header">
                                <h2 class="player-title">${episode.title}</h2>
                                <div class="player-tabs">
                                    <button class="player-tab active" data-tab="stream">
                                        <i class="fas fa-play"></i> Stream
                                    </button>
                                    <button class="player-tab" data-tab="download">
                                        <i class="fas fa-download"></i> Download
                                    </button>
                                </div>
                            </div>
                        </div>

                        ${serverHtml}
                        
                        <!-- Download Section -->
                        ${downloadHtml}

                    if (currentStreamUrl) {
                        // Open in new tab or use iframe
                        openStream(currentStreamUrl);
                    } else {
                        // Auto select first server
                        const firstServer = document.querySelector('.server-btn');
                        if (firstServer) {
                            firstServer.click();
                        }
                    }
                });
            }

            // Setup Tab Switching
            document.querySelectorAll('.player-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    const tabName = tab.dataset.tab;
                    document.querySelectorAll('.player-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    if (tabName === 'stream') {
                        document.querySelector('.server-section').style.display = 'block';
                        document.querySelector('.download-section').style.display = 'none';
                    } else {
                        document.querySelector('.server-section').style.display = 'none';
                        document.querySelector('.download-section').style.display = 'block';
                    }
                });
            });

            // Setup Server Buttons
            document.querySelectorAll('.server-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    loadServer(btn.dataset.serverId, btn.dataset.serverTitle, btn.dataset.quality);
                });
            });

            // Setup Episode Navigation
            document.querySelectorAll('.episode-nav-btn[data-episode]').forEach(btn => {
                btn.addEventListener('click', () => {
                    goToEpisode(btn.dataset.episode);
                });
            });
        }

        // Open Stream - Opens in new tab for better compatibility
        function openStream(url) {
            if (url) {
                window.open(url, '_blank');
            }
        }

        // Load Server
        async function loadServer(serverId, serverName, quality) {
            showToast(`Loading ${serverName} (${quality})...`);
            
            const data = await fetchAPI(`/server/${serverId}`);
            
            if (data.ok && data.data.url) {
                const videoContainer = document.getElementById('videoContainer');
                const watchBtn = document.getElementById('watchBtn');
                
                // Update iframe
                videoContainer.innerHTML = `<iframe id="videoFrame" src="${data.data.url}" allowfullscreen></iframe>`;
                
                // Update watch button
                if (watchBtn) {
                    watchBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> Buka di Tab Baru';
                }
                
                // Update selected server
                document.querySelectorAll('.server-btn').forEach(btn => {
                    btn.classList.remove('selected');
                    if (btn.dataset.serverId === serverId) {
                        btn.classList.add('selected');
                    }
                });
                
                currentStreamUrl = data.data.url;
                showToast(`${serverName} (${quality}) siap ditonton`);
            } else {
                showToast('Gagal memuat server');
            }
        }

        // Show Loading
        function showLoading() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Memuat data...</p>
                </div>
            `;
        }

        // Show Error
        function showError(message) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>Terjadi Kesalahan</h2>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="loadHome()" style="margin-top: 20px;">
                        <i class="fas fa-home"></i> Kembali ke Home
                    </button>
                </div>
            `;
        }

        // Show Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Render Footer
        function renderFooter() {
            return `
                <footer class="footer">
                    <div class="footer-content">
                        <div class="footer-logo">
                            <i class="fas fa-play-circle"></i>
                            <span>NimeStream</span>
                        </div>
                        <p class="footer-text">
                            Nonton Anime Subtitle Indonesia. Data dari <a href="https://www.sankavollerei.web.id/anime/" target="_blank">Sanka Vollerei API</a>
                        </p>
                    </div>
                </footer>
            `;
        }
    </script>
</body>
</html>
