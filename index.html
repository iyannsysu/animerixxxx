<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NimeStream - Nonton Anime Subtitle Indonesia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A24;
            --secondary: #7B2CBF;
            --bg-dark: #0a0a0f;
            --bg-card: #141420;
            --bg-card-hover: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #00D9FF;
            --gradient-1: linear-gradient(135deg, #FF6B35 0%, #FF8E53 100%);
            --gradient-2: linear-gradient(135deg, #7B2CBF 0%, #9D4EDD 100%);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* Header */
        .header {
            background: linear-gradient(180deg, rgba(20, 20, 32, 0.98) 0%, rgba(10, 10, 15, 0.95) 100%);
            backdrop-filter: blur(20px);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 0 20px;
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-primary);
        }

        .logo i {
            font-size: 28px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -1px;
        }

        .logo span span {
            color: var(--primary);
        }

        /* Navigation */
        .nav {
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .nav a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 10px 18px;
            border-radius: 25px;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav a:hover, .nav a.active {
            color: var(--text-primary);
            background: rgba(255, 107, 53, 0.15);
        }

        .nav a.active::after {
            content: '';
            position: absolute;
            bottom: 5px;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background: var(--primary);
            border-radius: 2px;
        }

        /* Search */
        .search-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        .search-box {
            display: flex;
            align-items: center;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            padding: 8px 20px;
            width: 280px;
            transition: all 0.3s ease;
        }

        .search-box:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 107, 53, 0.2);
        }

        .search-box input {
            background: transparent;
            border: none;
            outline: none;
            color: var(--text-primary);
            font-size: 14px;
            width: 100%;
            padding-left: 10px;
        }

        .search-box input::placeholder {
            color: var(--text-secondary);
        }

        .search-box button {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            transition: color 0.3s;
        }

        .search-box button:hover {
            color: var(--primary);
        }

        /* Mobile Menu */
        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 24px;
            cursor: pointer;
        }

        /* Main Content */
        .main {
            padding-top: 70px;
            min-height: 100vh;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 500px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
        }

        .hero-slider {
            position: relative;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, var(--bg-dark) 0%, transparent 60%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 40px;
        }

        .hero-info {
            max-width: 500px;
        }

        .hero-badge {
            display: inline-block;
            background: var(--gradient-1);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-title {
            font-size: 42px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 15px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-meta {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            color: var(--text-secondary);
            font-size: 14px;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hero-meta i {
            color: var(--primary);
        }

        .hero-description {
            color: var(--text-secondary);
            font-size: 14px;
            line-height: 1.7;
            margin-bottom: 25px;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .hero-actions {
            display: flex;
            gap: 15px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 28px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 5px 25px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 30px rgba(255, 107, 53, 0.5);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-sm {
            padding: 8px 16px;
            font-size: 12px;
        }

        /* Hero Navigation */
        .hero-nav {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 20;
        }

        .hero-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .hero-dot.active {
            background: var(--primary);
            width: 30px;
            border-radius: 5px;
        }

        /* Sections */
        .section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 24px;
            font-weight: 700;
        }

        .section-title i {
            color: var(--primary);
        }

        .section-link {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s;
        }

        .section-link:hover {
            color: var(--primary);
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 25px;
        }

        .anime-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow);
        }

        .anime-card-poster {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
        }

        .anime-card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .anime-card:hover .anime-card-poster img {
            transform: scale(1.1);
        }

        .anime-card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, transparent 50%);
            opacity: 0;
            transition: opacity 0.3s;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 20px;
        }

        .anime-card:hover .anime-card-overlay {
            opacity: 1;
        }

        .play-btn {
            width: 50px;
            height: 50px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 20px;
            transform: scale(0);
            transition: transform 0.3s ease;
        }

        .anime-card:hover .play-btn {
            transform: scale(1);
        }

        .anime-card-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: var(--primary);
            padding: 4px 10px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .anime-card-badge.ongoing {
            background: #22c55e;
        }

        .anime-card-badge.completed {
            background: var(--secondary);
        }

        .anime-card-rating {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 4px 8px;
            border-radius: 5px;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .anime-card-rating i {
            color: #fbbf24;
        }

        .anime-card-info {
            padding: 15px;
        }

        .anime-card-title {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text-primary);
        }

        .anime-card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: var(--text-secondary);
        }

        .anime-card-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .anime-card-meta i {
            font-size: 10px;
        }

        /* Genre Pills */
        .genre-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 30px;
        }

        .genre-pill {
            background: var(--bg-card);
            padding: 8px 20px;
            border-radius: 25px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            border: 1px solid transparent;
        }

        .genre-pill:hover, .genre-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Schedule */
        .schedule-container {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding-bottom: 20px;
            scroll-snap-type: x mandatory;
        }

        .schedule-day {
            min-width: 300px;
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            scroll-snap-align: start;
        }

        .schedule-day-header {
            background: var(--gradient-1);
            padding: 15px 20px;
            font-size: 16px;
            font-weight: 600;
        }

        .schedule-day-content {
            padding: 15px;
        }

        .schedule-item {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 10px;
            transition: background 0.3s;
            cursor: pointer;
        }

        .schedule-item:hover {
            background: var(--bg-card-hover);
        }

        .schedule-item-poster {
            width: 60px;
            height: 80px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .schedule-item-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .schedule-item-info h4 {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 5px;
            line-height: 1.3;
        }

        .schedule-item-info span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 40px;
        }

        .pagination button {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .pagination button:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination button.active {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 60px 20px;
            text-align: center;
            margin-bottom: 40px;
        }

        .page-header h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 16px;
        }

        /* Detail Page */
        .detail-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .detail-hero {
            display: flex;
            gap: 40px;
            margin-bottom: 50px;
        }

        .detail-poster {
            width: 300px;
            flex-shrink: 0;
        }

        .detail-poster img {
            width: 100%;
            border-radius: 15px;
            box-shadow: var(--shadow);
        }

        .detail-info {
            flex: 1;
        }

        .detail-badge {
            display: inline-block;
            background: var(--gradient-1);
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 15px;
        }

        .detail-title {
            font-size: 36px;
            font-weight: 800;
            margin-bottom: 10px;
            line-height: 1.2;
        }

        .detail-title-jp {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .detail-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 25px;
        }

        .detail-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-secondary);
        }

        .detail-meta-item i {
            color: var(--primary);
        }

        .detail-genres {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 25px;
        }

        .detail-genre {
            background: var(--bg-card);
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .detail-genre:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .detail-synopsis {
            margin-bottom: 30px;
        }

        .detail-synopsis h3 {
            font-size: 18px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .detail-synopsis h3 i {
            color: var(--primary);
        }

        .detail-synopsis p {
            color: var(--text-secondary);
            line-height: 1.8;
            font-size: 14px;
        }

        /* Episode List */
        .episode-list {
            background: var(--bg-card);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
        }

        .episode-list h3 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .episode-list h3 i {
            color: var(--primary);
        }

        .episode-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .episode-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px;
            background: var(--bg-card-hover);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .episode-item:hover {
            background: var(--primary);
        }

        .episode-number {
            width: 45px;
            height: 45px;
            background: var(--gradient-1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .episode-info h4 {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 3px;
        }

        .episode-info span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .episode-item:hover .episode-info span {
            color: rgba(255, 255, 255, 0.7);
        }

        /* Batch Download */
        .batch-download {
            background: var(--gradient-2);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 40px;
        }

        .batch-download h3 {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .batch-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .batch-link {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 10px;
            text-decoration: none;
            color: white;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .batch-link:hover {
            background: rgba(255, 255, 255, 0.25);
            transform: translateY(-2px);
        }

        /* Episode Page */
        .episode-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .episode-player {
            background: var(--bg-card);
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .player-header {
            padding: 15px 20px;
            background: var(--bg-card-hover);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .player-header h2 {
            font-size: 18px;
        }

        .player-tabs {
            display: flex;
            gap: 5px;
        }

        .player-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 13px;
            border-radius: 8px;
            transition: all 0.3s;
        }

        .player-tab.active {
            background: var(--primary);
            color: white;
        }

        .player-frame {
            aspect-ratio: 16/9;
            background: #000;
        }

        .player-frame iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Server List */
        .server-list {
            padding: 20px;
        }

        .server-quality {
            margin-bottom: 20px;
        }

        .server-quality h4 {
            font-size: 14px;
            color: var(--text-secondary);
            margin-bottom: 10px;
        }

        .server-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .server-btn {
            padding: 10px 20px;
            background: var(--bg-card-hover);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .server-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .server-btn i {
            color: var(--primary);
        }

        .server-btn:hover i {
            color: white;
        }

        /* Download Section */
        .download-section {
            padding: 20px;
        }

        .download-quality {
            margin-bottom: 20px;
        }

        .download-quality h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .download-quality span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .download-links {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .download-btn {
            padding: 10px 18px;
            background: var(--gradient-1);
            border: none;
            border-radius: 10px;
            color: white;
            font-size: 13px;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 107, 53, 0.4);
        }

        /* Episode Navigation */
        .episode-nav {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            padding: 20px;
            background: var(--bg-card);
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .episode-nav-btn {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 24px;
            background: var(--bg-card-hover);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 14px;
            transition: all 0.3s;
        }

        .episode-nav-btn:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .episode-nav-btn.disabled {
            opacity: 0.5;
            pointer-events: none;
        }

        /* Recommended */
        .recommended-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 20px;
        }

        /* Loading */
        .loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 3px solid var(--bg-card);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Error */
        .error-message {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }

        .error-message i {
            font-size: 48px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        /* Footer */
        .footer {
            background: var(--bg-card);
            padding: 40px 20px;
            margin-top: 60px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .footer-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .footer-logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .footer-logo i {
            font-size: 24px;
            color: var(--primary);
        }

        .footer-logo span {
            font-size: 18px;
            font-weight: 600;
        }

        .footer-text {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .footer-text a {
            color: var(--primary);
            text-decoration: none;
        }

        /* Mobile Navigation */
        .mobile-nav {
            display: none;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--bg-card);
            padding: 10px 20px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            z-index: 1000;
        }

        .mobile-nav-items {
            display: flex;
            justify-content: space-around;
        }

        .mobile-nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 11px;
            padding: 5px;
        }

        .mobile-nav-item i {
            font-size: 20px;
        }

        .mobile-nav-item.active {
            color: var(--primary);
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .nav {
                display: none;
            }

            .mobile-menu-btn {
                display: block;
            }

            .search-box {
                width: 200px;
            }

            .detail-hero {
                flex-direction: column;
            }

            .detail-poster {
                width: 100%;
                max-width: 300px;
                margin: 0 auto;
            }
        }

        @media (max-width: 768px) {
            .header-container {
                height: 60px;
            }

            .logo span {
                font-size: 18px;
            }

            .search-box {
                width: 150px;
            }

            .hero {
                height: 400px;
            }

            .hero-content {
                padding: 0 20px;
            }

            .hero-title {
                font-size: 28px;
            }

            .hero-description {
                display: none;
            }

            .hero-actions {
                flex-direction: column;
            }

            .section {
                padding: 30px 15px;
            }

            .section-title {
                font-size: 20px;
            }

            .anime-grid {
                grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
                gap: 15px;
            }

            .detail-title {
                font-size: 24px;
            }

            .page-header h1 {
                font-size: 28px;
            }

            .mobile-nav {
                display: block;
            }

            .main {
                padding-bottom: 80px;
            }

            .schedule-day {
                min-width: 260px;
            }
        }

        @media (max-width: 480px) {
            .search-container {
                display: none;
            }

            .anime-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .anime-card-info {
                padding: 10px;
            }

            .anime-card-title {
                font-size: 12px;
            }

            .pagination button {
                padding: 8px 12px;
                font-size: 12px;
            }
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-card);
            padding: 15px 25px;
            border-radius: 10px;
            box-shadow: var(--shadow);
            z-index: 2000;
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0;
            transition: all 0.3s ease;
        }

        .toast.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .toast i {
            color: var(--primary);
        }

        /* Search Results Overlay */
        .search-results {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 15px;
            margin-top: 10px;
            max-height: 400px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: none;
            z-index: 100;
        }

        .search-results.show {
            display: block;
        }

        .search-result-item {
            display: flex;
            gap: 15px;
            padding: 12px 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-result-item:hover {
            background: var(--bg-card-hover);
        }

        .search-result-poster {
            width: 50px;
            height: 70px;
            border-radius: 8px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .search-result-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-result-info h4 {
            font-size: 14px;
            margin-bottom: 5px;
        }

        .search-result-info span {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .no-results {
            padding: 30px;
            text-align: center;
            color: var(--text-secondary);
        }

        /* Keyboard Navigation */
        .keyboard-nav {
            position: fixed;
            top: 80px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            z-index: 100;
        }

        .keyboard-nav button {
            width: 40px;
            height: 40px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .keyboard-nav button:hover {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        /* Skeleton Loading */
        .skeleton {
            background: linear-gradient(90deg, var(--bg-card) 25%, var(--bg-card-hover) 50%, var(--bg-card) 75%);
            background-size: 200% 100%;
            animation: skeleton-loading 1.5s infinite;
        }

        @keyframes skeleton-loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }

        .skeleton-card {
            aspect-ratio: 3/4;
            border-radius: 12px;
        }

        .skeleton-text {
            height: 16px;
            border-radius: 5px;
            margin-top: 12px;
        }

        .skeleton-text-short {
            height: 12px;
            width: 60%;
            border-radius: 5px;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="header-container">
            <a href="#" onclick="goHome()" class="logo">
                <i class="fas fa-play-circle"></i>
                <span>Nime<span>Stream</span></span>
            </a>
            
            <nav class="nav">
                <a href="#" onclick="goHome()" class="nav-link active" data-page="home">Home</a>
                <a href="#" onclick="showOngoing()" class="nav-link" data-page="ongoing">Sedang Tayang</a>
                <a href="#" onclick="showCompleted()" class="nav-link" data-page="completed">Tamat</a>
                <a href="#" onclick="showSchedule()" class="nav-link" data-page="schedule">Jadwal Rilis</a>
                <a href="#" onclick="showGenres()" class="nav-link" data-page="genres">Genre</a>
            </nav>

            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Cari anime..." autocomplete="off">
                </div>
                <div class="search-results" id="searchResults"></div>
            </div>

            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fas fa-bars"></i>
            </button>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main" id="mainContent">
        <!-- Content will be loaded dynamically -->
    </main>

    <!-- Mobile Navigation -->
    <nav class="mobile-nav">
        <div class="mobile-nav-items">
            <a href="#" onclick="goHome()" class="mobile-nav-item active" data-page="home">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </a>
            <a href="#" onclick="showOngoing()" class="mobile-nav-item" data-page="ongoing">
                <i class="fas fa-play-circle"></i>
                <span>Tayang</span>
            </a>
            <a href="#" onclick="showCompleted()" class="mobile-nav-item" data-page="completed">
                <i class="fas fa-check-circle"></i>
                <span>Tamat</span>
            </a>
            <a href="#" onclick="showSchedule()" class="mobile-nav-item" data-page="schedule">
                <i class="fas fa-calendar"></i>
                <span>Jadwal</span>
            </a>
            <a href="#" onclick="showGenres()" class="mobile-nav-item" data-page="genres">
                <i class="fas fa-tags"></i>
                <span>Genre</span>
            </a>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Pesan notifikasi</span>
    </div>

    <script>
        // API Base URL
        const API_BASE = 'https://www.sankavollerei.web.id/anime';

        // Current State
        let currentPage = 'home';
        let currentAnimeSlug = null;
        let currentEpisodeSlug = null;
        let currentGenreSlug = null;
        let currentType = null;
        let page = 1;
        let homeData = null;
        let searchTimeout = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            loadHome();
            setupSearch();
        });

        // Setup Search
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const searchResults = document.getElementById('searchResults');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                
                clearTimeout(searchTimeout);
                
                if (query.length < 2) {
                    searchResults.classList.remove('show');
                    return;
                }

                searchTimeout = setTimeout(() => {
                    searchAnime(query);
                }, 500);
            });

            searchInput.addEventListener('focus', () => {
                if (searchInput.value.length >= 2) {
                    searchResults.classList.add('show');
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-container')) {
                    searchResults.classList.remove('show');
                }
            });
        }

        // Search Anime
        async function searchAnime(query) {
            const searchResults = document.getElementById('searchResults');
            
            try {
                const response = await fetch(`${API_BASE}/search/${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.ok && data.data.animeList.length > 0) {
                    let html = '';
                    data.data.animeList.forEach(anime => {
                        html += `
                            <div class="search-result-item" onclick="goToAnime('${anime.animeId}')">
                                <div class="search-result-poster">
                                    <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/50x70/141420/a0a0b0?text=No+Image'">
                                </div>
                                <div class="search-result-info">
                                    <h4>${anime.title}</h4>
                                    <span>${anime.status || ''} ${anime.score ? '• ' + anime.score : ''}</span>
                                </div>
                            </div>
                        `;
                    });
                    searchResults.innerHTML = html;
                } else {
                    searchResults.innerHTML = '<div class="no-results">Tidak ada hasil</div>';
                }
                
                searchResults.classList.add('show');
            } catch (error) {
                console.error('Search error:', error);
                searchResults.innerHTML = '<div class="no-results">Terjadi kesalahan</div>';
                searchResults.classList.add('show');
            }
        }

        // Fetch Data
        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { ok: false, message: 'Terjadi kesalahan koneksi' };
            }
        }

        // Load Home
        async function loadHome() {
            currentPage = 'home';
            updateNav('home');
            showLoading();

            const data = await fetchAPI('/home');
            
            if (data.ok) {
                homeData = data.data;
                renderHome(data.data);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Render Home
        function renderHome(data) {
            const mainContent = document.getElementById('mainContent');
            
            // Hero Slider
            const heroAnime = data.ongoing.animeList.slice(0, 5);
            let heroHtml = `
                <section class="hero">
                    <div class="hero-slider" id="heroSlider">
                        ${heroAnime.map((anime, i) => `
                            <div class="hero-slide ${i === 0 ? 'active' : ''}" data-index="${i}">
                                <div class="hero-bg" style="background-image: url('${anime.poster}')"></div>
                                <div class="hero-overlay"></div>
                            </div>
                        `).join('')}
                    </div>
                    <div class="hero-content">
                        <div class="hero-info">
                            <span class="hero-badge">Sedang Tayang</span>
                            <h1 class="hero-title" id="heroTitle">${heroAnime[0].title}</h1>
                            <div class="hero-meta">
                                <span><i class="fas fa-film"></i> Episode ${heroAnime[0].episodes}</span>
                                <span><i class="fas fa-clock"></i> ${heroAnime[0].releaseDay}</span>
                                <span><i class="fas fa-calendar"></i> ${heroAnime[0].latestReleaseDate}</span>
                            </div>
                            <div class="hero-actions">
                                <button class="btn btn-primary" onclick="goToAnime('${heroAnime[0].animeId}')">
                                    <i class="fas fa-play"></i> Lihat Detail
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="hero-nav">
                        ${heroAnime.map((_, i) => `<div class="hero-dot ${i === 0 ? 'active' : ''}" onclick="goToSlide(${i})"></div>`).join('')}
                    </div>
                </section>
            `;

            // Ongoing Section
            let ongoingHtml = `
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title"><i class="fas fa-play-circle"></i> Anime Sedang Tayang</h2>
                        <a href="#" onclick="showOngoing(); return false;" class="section-link">
                            Lihat Semua <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                    <div class="anime-grid">
                        ${data.ongoing.animeList.slice(0, 8).map(anime => renderAnimeCard(anime, 'ongoing')).join('')}
                    </div>
                </section>
            `;

            // Completed Section
            let completedHtml = `
                <section class="section">
                    <div class="section-header">
                        <h2 class="section-title"><i class="fas fa-check-circle"></i> Anime Tamat</h2>
                        <a href="#" onclick="showCompleted(); return false;" class="section-link">
                            Lihat Semua <i class="fas fa-arrow-right"></i>
                        </a>
                    </div>
                    <div class="anime-grid">
                        ${data.completed.animeList.slice(0, 8).map(anime => renderAnimeCard(anime, 'completed')).join('')}
                    </div>
                </section>
            `;

            // Latest Section
            let latestHtml = '';
            if (data.latestUpdate && data.latestUpdate.animeList) {
                latestHtml = `
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-clock"></i> Update Terbaru</h2>
                        </div>
                        <div class="anime-grid">
                            ${data.latestUpdate.animeList.slice(0, 8).map(anime => renderAnimeCard(anime)).join('')}
                        </div>
                    </section>
                `;
            }

            // Popular Section
            let popularHtml = '';
            if (data.popular && data.popular.animeList) {
                popularHtml = `
                    <section class="section">
                        <div class="section-header">
                            <h2 class="section-title"><i class="fas fa-fire"></i> Anime Populer</h2>
                        </div>
                        <div class="anime-grid">
                            ${data.popular.animeList.slice(0, 8).map(anime => renderAnimeCard(anime)).join('')}
                        </div>
                    </section>
                `;
            }

            mainContent.innerHTML = heroHtml + ongoingHtml + completedHtml + latestHtml + popularHtml + renderFooter();

            // Setup Hero Slider
            setupHeroSlider(heroAnime);
        }

        // Setup Hero Slider
        function setupHeroSlider(animeList) {
            window.heroInterval = setInterval(() => {
                const dots = document.querySelectorAll('.hero-dot');
                const slides = document.querySelectorAll('.hero-slide');
                let currentIndex = 0;
                
                dots.forEach((dot, i) => {
                    if (dot.classList.contains('active')) currentIndex = i;
                });

                const nextIndex = (currentIndex + 1) % animeList.length;
                goToSlide(nextIndex);
            }, 6000);
        }

        // Go to Slide
        function goToSlide(index) {
            const dots = document.querySelectorAll('.hero-dot');
            const slides = document.querySelectorAll('.hero-slide');
            const heroTitle = document.getElementById('heroTitle');

            dots.forEach(dot => dot.classList.remove('active'));
            slides.forEach(slide => slide.classList.remove('active'));

            dots[index].classList.add('active');
            slides[index].classList.add('active');

            // Update hero title
            if (homeData && homeData.ongoing.animeList[index]) {
                const anime = homeData.ongoing.animeList[index];
                heroTitle.textContent = anime.title;
            }
        }

        // Render Anime Card
        function renderAnimeCard(anime, type = '') {
            const badge = type === 'ongoing' ? 'ongoing' : (type === 'completed' ? 'completed' : (anime.status === 'Ongoing' ? 'ongoing' : 'completed'));
            const badgeText = type === 'ongoing' ? 'Ongoing' : (type === 'completed' ? 'Tamat' : (anime.status === 'Ongoing' ? 'Ongoing' : 'Tamat'));
            
            return `
                <div class="anime-card" onclick="goToAnime('${anime.animeId}')">
                    <div class="anime-card-poster">
                        <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/180x240/141420/a0a0b0?text=No+Image'">
                        <span class="anime-card-badge ${badge}">${badgeText}</span>
                        ${anime.score ? `<span class="anime-card-rating"><i class="fas fa-star"></i> ${anime.score}</span>` : ''}
                        <div class="anime-card-overlay">
                            <div class="play-btn"><i class="fas fa-play"></i></div>
                        </div>
                    </div>
                    <div class="anime-card-info">
                        <h3 class="anime-card-title">${anime.title}</h3>
                        <div class="anime-card-meta">
                            <span><i class="fas fa-film"></i> ${anime.episodes || '?'} Ep</span>
                            ${anime.releaseDay ? `<span><i class="fas fa-calendar"></i> ${anime.releaseDay}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Show Ongoing Anime
        async function showOngoing() {
            currentPage = 'ongoing';
            currentType = 'ongoing';
            page = 1;
            updateNav('ongoing');
            showLoading();

            const data = await fetchAPI(`/ongoing-anime?page=${page}`);
            
            if (data.ok) {
                renderAnimeList(data.data.animeList, 'Anime Sedang Tayang', 'ongoing', data.pagination);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Show Completed Anime
        async function showCompleted() {
            currentPage = 'completed';
            currentType = 'completed';
            page = 1;
            updateNav('completed');
            showLoading();

            const data = await fetchAPI(`/complete-anime?page=${page}`);
            
            if (data.ok) {
                renderAnimeList(data.data.animeList, 'Anime Tamat', 'completed', data.pagination);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Show Schedule
        async function showSchedule() {
            currentPage = 'schedule';
            updateNav('schedule');
            showLoading();

            const data = await fetchAPI('/schedule');
            
            if (data.ok) {
                renderSchedule(data.data);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Render Schedule
        function renderSchedule(schedule) {
            const mainContent = document.getElementById('mainContent');
            
            const dayNames = {
                'Senin': 'Monday',
                'Selasa': 'Tuesday',
                'Rabu': 'Wednesday',
                'Kamis': 'Thursday',
                'Jumat': 'Friday',
                'Sabtu': 'Saturday',
                'Minggu': 'Sunday'
            };

            const sortedSchedule = schedule.sort((a, b) => {
                const order = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
                return order.indexOf(a.day) - order.indexOf(b.day);
            });

            const today = new Date();
            const dayName = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][today.getDay()];

            let html = `
                <section class="page-header">
                    <h1><i class="fas fa-calendar-alt"></i> Jadwal Rilis Anime</h1>
                    <p>Daftar anime yang dirilis setiap harinya</p>
                </section>
                <section class="section" style="padding-top: 0;">
                    <div class="schedule-container">
                        ${sortedSchedule.map(day => `
                            <div class="schedule-day" style="${day.day === dayName ? 'border: 2px solid var(--primary);' : ''}">
                                <div class="schedule-day-header">
                                    ${day.day} ${day.day === dayName ? '(Hari Ini)' : ''}
                                </div>
                                <div class="schedule-day-content">
                                    ${day.anime_list.map(anime => `
                                        <div class="schedule-item" onclick="goToAnime('${anime.slug}')">
                                            <div class="schedule-item-poster">
                                                <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/60x80/141420/a0a0b0?text=No'">
                                            </div>
                                            <div class="schedule-item-info">
                                                <h4>${anime.title}</h4>
                                                <span>Klik untuk detail</span>
                                            </div>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
        }

        // Show Genres
        async function showGenres() {
            currentPage = 'genres';
            updateNav('genres');
            showLoading();

            const data = await fetchAPI('/genre');
            
            if (data.ok) {
                renderGenres(data.data.genreList);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Render Genres
        function renderGenres(genres) {
            const mainContent = document.getElementById('mainContent');
            
            let html = `
                <section class="page-header">
                    <h1><i class="fas fa-tags"></i> Daftar Genre</h1>
                    <p>Pilih genre untuk melihat anime berdasarkan genre</p>
                </section>
                <section class="section" style="padding-top: 0;">
                    <div class="genre-pills" style="justify-content: center;">
                        ${genres.map(genre => `
                            <a href="#" class="genre-pill" onclick="showGenreAnime('${genre.genreId}', '${genre.title}'); return false;">
                                ${genre.title}
                            </a>
                        `).join('')}
                    </div>
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
        }

        // Show Genre Anime
        async function showGenreAnime(genreId, genreTitle) {
            currentPage = 'genre';
            currentGenreSlug = genreId;
            page = 1;
            showLoading();

            const data = await fetchAPI(`/genre/${genreId}?page=${page}`);
            
            if (data.ok) {
                renderAnimeList(data.data.animeList, `Genre: ${genreTitle}`, 'genre', data.pagination);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Render Anime List
        function renderAnimeList(animeList, title, type, pagination = null) {
            const mainContent = document.getElementById('mainContent');
            
            let html = `
                <section class="page-header">
                    <h1><i class="fas fa-film"></i> ${title}</h1>
                    <p>Ditemukan ${animeList.length} anime</p>
                </section>
                <section class="section" style="padding-top: 0;">
                    <div class="anime-grid">
                        ${animeList.map(anime => renderAnimeCard(anime)).join('')}
                    </div>
                    ${pagination ? renderPagination(pagination) : ''}
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
        }

        // Render Pagination
        function renderPagination(pagination) {
            if (!pagination || !pagination.hasNextPage) return '';

            const currentPage = pagination.currentPage || page;
            
            return `
                <div class="pagination">
                    <button onclick="loadPage(${currentPage - 1})" ${currentPage === 1 ? 'disabled' : ''}>
                        <i class="fas fa-chevron-left"></i> Prev
                    </button>
                    <button class="active">Halaman ${currentPage}</button>
                    <button onclick="loadPage(${currentPage + 1})">
                        Next <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            `;
        }

        // Load Page
        async function loadPage(pageNum) {
            page = pageNum;
            showLoading();

            let endpoint = '';
            if (currentType === 'ongoing') {
                endpoint = `/ongoing-anime?page=${page}`;
            } else if (currentType === 'completed') {
                endpoint = `/complete-anime?page=${page}`;
            } else if (currentPage === 'genre') {
                endpoint = `/genre/${currentGenreSlug}?page=${page}`;
            }

            const data = await fetchAPI(endpoint);
            
            if (data.ok) {
                renderAnimeList(data.data.animeList, '', currentType, data.pagination);
                window.scrollTo({ top: 0, behavior: 'smooth' });
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Go to Anime Detail
        async function goToAnime(animeId) {
            currentPage = 'detail';
            currentAnimeSlug = animeId;
            showLoading();
            document.getElementById('searchResults').classList.remove('show');

            const data = await fetchAPI(`/anime/${animeId}`);
            
            if (data.ok) {
                renderAnimeDetail(data.data);
            } else {
                showError(data.message || 'Anime tidak ditemukan');
            }
        }

        // Render Anime Detail
        function renderAnimeDetail(anime) {
            const mainContent = document.getElementById('mainContent');
            
            // Combine synopsis paragraphs
            let synopsis = '';
            if (anime.synopsis && anime.synopsis.paragraphs) {
                synopsis = anime.synopsis.paragraphs.join('<br><br>');
            }

            // Batch download section
            let batchHtml = '';
            if (anime.batch) {
                batchHtml = `
                    <div class="batch-download">
                        <h3><i class="fas fa-download"></i> Download Batch</h3>
                        <div class="batch-links">
                            ${anime.batch.map(batch => `
                                <a href="${batch.url}" target="_blank" class="batch-link">
                                    <i class="fas fa-file-archive"></i> ${batch.quality}
                                </a>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            let html = `
                <section class="detail-container">
                    <div class="detail-hero">
                        <div class="detail-poster">
                            <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/300x450/141420/a0a0b0?text=No+Image'">
                        </div>
                        <div class="detail-info">
                            <span class="detail-badge">${anime.status}</span>
                            <h1 class="detail-title">${anime.title}</h1>
                            ${anime.japanese ? `<p class="detail-title-jp">${anime.japanese}</p>` : ''}
                            
                            <div class="detail-meta">
                                ${anime.type ? `<div class="detail-meta-item"><i class="fas fa-tv"></i> ${anime.type}</div>` : ''}
                                ${anime.episodes ? `<div class="detail-meta-item"><i class="fas fa-film"></i> ${anime.episodes} Episode</div>` : ''}
                                ${anime.duration ? `<div class="detail-meta-item"><i class="fas fa-clock"></i> ${anime.duration}</div>` : ''}
                                ${anime.aired ? `<div class="detail-meta-item"><i class="fas fa-calendar"></i> ${anime.aired}</div>` : ''}
                                ${anime.score ? `<div class="detail-meta-item"><i class="fas fa-star"></i> ${anime.score}</div>` : ''}
                            </div>

                            ${anime.producers ? `<div class="detail-meta"><div class="detail-meta-item"><i class="fas fa-industry"></i> ${anime.producers}</div></div>` : ''}
                            ${anime.studios ? `<div class="detail-meta"><div class="detail-meta-item"><i class="fas fa-building"></i> ${anime.studios}</div></div>` : ''}

                            <div class="detail-genres">
                                ${anime.genreList.map(genre => `
                                    <a href="#" class="detail-genre" onclick="showGenreAnime('${genre.genreId}', '${genre.title}'); return false;">
                                        ${genre.title}
                                    </a>
                                `).join('')}
                            </div>

                            ${synopsis ? `
                                <div class="detail-synopsis">
                                    <h3><i class="fas fa-book-open"></i> Sinopsis</h3>
                                    <p>${synopsis}</p>
                                </div>
                            ` : ''}

                            <div class="hero-actions">
                                ${anime.episodeList && anime.episodeList.length > 0 ? `
                                    <button class="btn btn-primary" onclick="goToEpisode('${anime.episodeList[0].episodeId}')">
                                        <i class="fas fa-play"></i> Nonton Episode 1
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>

                    ${anime.episodeList && anime.episodeList.length > 0 ? `
                        <div class="episode-list">
                            <h3><i class="fas fa-list"></i> Daftar Episode (${anime.episodeList.length})</h3>
                            <div class="episode-grid">
                                ${anime.episodeList.map(ep => `
                                    <div class="episode-item" onclick="goToEpisode('${ep.episodeId}')">
                                        <div class="episode-number">${ep.eps}</div>
                                        <div class="episode-info">
                                            <h4>Episode ${ep.eps}</h4>
                                            <span>${ep.date}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${batchHtml}

                    ${anime.recommendedAnimeList && anime.recommendedAnimeList.length > 0 ? `
                        <section class="section" style="padding-top: 0;">
                            <div class="section-header">
                                <h2 class="section-title"><i class="fas fa-thumbs-up"></i> Rekomendasi</h2>
                            </div>
                            <div class="anime-grid recommended-grid">
                                ${anime.recommendedAnimeList.map(anime => renderAnimeCard(anime)).join('')}
                            </div>
                        </section>
                    ` : ''}
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Go to Episode
        async function goToEpisode(episodeId) {
            currentPage = 'episode';
            currentEpisodeSlug = episodeId;
            showLoading();

            const data = await fetchAPI(`/episode/${episodeId}`);
            
            if (data.ok) {
                renderEpisode(data.data);
            } else {
                showError(data.message || 'Episode tidak ditemukan');
            }
        }

        // Render Episode
        function renderEpisode(episode) {
            const mainContent = document.getElementById('mainContent');

            // Extract server ID from URL
            let defaultServerId = '';
            if (episode.defaultStreamingUrl) {
                const match = episode.defaultStreamingUrl.match(/\/(\d+-[A-Za-z0-9]+)$/);
                if (match) {
                    defaultServerId = match[1];
                }
            }

            // Render server list
            let serverHtml = '<div class="server-list">';
            if (episode.server && episode.server.qualities) {
                episode.server.qualities.forEach(quality => {
                    serverHtml += `
                        <div class="server-quality">
                            <h4>${quality.title}</h4>
                            <div class="server-buttons">
                                ${quality.serverList.map(server => `
                                    <button class="server-btn" onclick="loadServer('${server.serverId}', '${server.title}')">
                                        <i class="fas fa-play-circle"></i> ${server.title.trim()}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            }
            serverHtml += '</div>';

            // Render download list
            let downloadHtml = '<div class="download-section">';
            if (episode.downloadUrl && episode.downloadUrl.qualities) {
                episode.downloadUrl.qualities.forEach(quality => {
                    downloadHtml += `
                        <div class="download-quality">
                            <h4>${quality.title}</h4>
                            <span>${quality.size}</span>
                            <div class="download-links">
                                ${quality.urls.map(url => `
                                    <a href="${url.url}" target="_blank" class="download-btn">
                                        <i class="fas fa-download"></i> ${url.title}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            }
            downloadHtml += '</div>';

            // Episode navigation
            let prevHtml = episode.hasPrevEpisode ? `
                <a href="#" class="episode-nav-btn" onclick="goToEpisode('${episode.prevEpisode.episodeId}'); return false;">
                    <i class="fas fa-chevron-left"></i> Prev
                </a>
            ` : '<span class="episode-nav-btn disabled"><i class="fas fa-chevron-left"></i> Prev</span>';

            let nextHtml = episode.hasNextEpisode ? `
                <a href="#" class="episode-nav-btn" onclick="goToEpisode('${episode.nextEpisode.episodeId}'); return false;">
                    Next <i class="fas fa-chevron-right"></i>
                </a>
            ` : '<span class="episode-nav-btn disabled">Next <i class="fas fa-chevron-right"></i></span>';

            let html = `
                <section class="episode-page">
                    <div class="episode-nav">
                        ${prevHtml}
                        <a href="#" class="episode-nav-btn" onclick="goToAnime('${episode.animeId}'); return false;">
                            <i class="fas fa-home"></i> Kembali ke Detail
                        </a>
                        ${nextHtml}
                    </div>

                    <div class="episode-player">
                        <div class="player-header">
                            <h2>${episode.title}</h2>
                            <div class="player-tabs">
                                <button class="player-tab active" onclick="switchTab('stream', this)">
                                    <i class="fas fa-play"></i> Streaming
                                </button>
                                <button class="player-tab" onclick="switchTab('download', this)">
                                    <i class="fas fa-download"></i> Download
                                </button>
                            </div>
                        </div>
                        <div id="streamTab">
                            <div class="player-frame" id="playerFrame">
                                ${episode.defaultStreamingUrl ? `
                                    <iframe src="${episode.defaultStreamingUrl}" allowfullscreen></iframe>
                                ` : `
                                    <div style="display: flex; align-items: center; justify-content: center; height: 100%; color: var(--text-secondary);">
                                        <p>Pilih server streaming terlebih dahulu</p>
                                    </div>
                                `}
                            </div>
                            ${serverHtml}
                        </div>
                        <div id="downloadTab" style="display: none;">
                            ${downloadHtml}
                        </div>
                    </div>
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Switch Tab
        function switchTab(tab, btn) {
            const tabs = document.querySelectorAll('.player-tab');
            tabs.forEach(t => t.classList.remove('active'));
            btn.classList.add('active');

            if (tab === 'stream') {
                document.getElementById('streamTab').style.display = 'block';
                document.getElementById('downloadTab').style.display = 'none';
            } else {
                document.getElementById('streamTab').style.display = 'none';
                document.getElementById('downloadTab').style.display = 'block';
            }
        }

        // Load Server
        async function loadServer(serverId, serverName) {
            showToast(`Loading server ${serverName}...`);
            
            const data = await fetchAPI(`/server/${serverId}`);
            
            if (data.ok) {
                const playerFrame = document.getElementById('playerFrame');
                playerFrame.innerHTML = `<iframe src="${data.data.url}" allowfullscreen></iframe>`;
                showToast(`Server ${serverName} berhasil dimuat`);
            } else {
                showToast('Gagal memuat server');
            }
        }

        // Go Home
        function goHome() {
            loadHome();
        }

        // Update Navigation
        function updateNav(page) {
            const navLinks = document.querySelectorAll('.nav a, .mobile-nav-item');
            navLinks.forEach(link => {
                link.classList.remove('active');
                if (link.dataset.page === page) {
                    link.classList.add('active');
                }
            });
        }

        // Show Loading
        function showLoading() {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Memuat data...</p>
                </div>
            `;
        }

        // Show Error
        function showError(message) {
            const mainContent = document.getElementById('mainContent');
            mainContent.innerHTML = `
                <div class="error-message">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h2>Terjadi Kesalahan</h2>
                    <p>${message}</p>
                    <button class="btn btn-primary" onclick="goHome()" style="margin-top: 20px;">
                        <i class="fas fa-home"></i> Kembali ke Home
                    </button>
                </div>
            `;
        }

        // Show Toast
        function showToast(message) {
            const toast = document.getElementById('toast');
            const toastMessage = document.getElementById('toastMessage');
            toastMessage.textContent = message;
            toast.classList.add('show');
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Toggle Mobile Menu
        function toggleMobileMenu() {
            // For mobile nav, we just ensure the mobile nav is visible
        }

        // Render Footer
        function renderFooter() {
            return `
                <footer class="footer">
                    <div class="footer-content">
                        <div class="footer-logo">
                            <i class="fas fa-play-circle"></i>
                            <span>NimeStream</span>
                        </div>
                        <p class="footer-text">
                            Nonton Anime Subtitle Indonesia. Data dari <a href="https://www.sankavollerei.web.id/anime/" target="_blank">Sanka Vollerei API</a>
                        </p>
                    </div>
                </footer>
            `;
        }
    </script>
</body>
</html>
