<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>NimeStream - Nonton Anime Subtitle Indonesia</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #FF6B35;
            --primary-dark: #E85A24;
            --secondary: #7B2CBF;
            --bg-dark: #0a0a0f;
            --bg-card: #141420;
            --bg-card-hover: #1a1a2e;
            --text-primary: #ffffff;
            --text-secondary: #a0a0b0;
            --accent: #00D9FF;
            --gradient-1: linear-gradient(135deg, #FF6B35 0%, #FF8E53 100%);
            --gradient-2: linear-gradient(135deg, #7B2CBF 0%, #9D4EDD 100%);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            --header-height: 60px;
            --bottom-nav-height: 65px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: var(--bottom-nav-height);
        }

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: var(--bg-dark);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--primary);
            border-radius: 4px;
        }

        /* ========== MODAL PEMBERITAHUAN ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.hidden {
            display: none;
        }

        .modal-content {
            background: linear-gradient(135deg, var(--bg-card) 0%, #1a1a2e 100%);
            border-radius: 20px;
            padding: 30px 25px;
            max-width: 400px;
            width: 100%;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 107, 53, 0.3);
            animation: modalFadeIn 0.5s ease;
        }

        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.9) translateY(-20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .modal-icon {
            width: 80px;
            height: 80px;
            background: var(--gradient-1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .modal-icon i {
            font-size: 36px;
            color: white;
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 15px;
            color: var(--text-primary);
        }

        .modal-text {
            font-size: 14px;
            line-height: 1.7;
            color: var(--text-secondary);
            margin-bottom: 25px;
        }

        .modal-whatsapp {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: #25D366;
            color: white;
            padding: 14px 25px;
            border-radius: 30px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .modal-whatsapp:hover {
            background: #20bd5a;
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(37, 211, 102, 0.4);
        }

        .modal-whatsapp i {
            font-size: 20px;
        }

        .modal-btn-close {
            display: block;
            width: 100%;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: var(--text-secondary);
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .modal-btn-close:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-primary);
        }

        /* Header - NO BLUR */
        .header {
            background: var(--bg-card);
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            height: var(--header-height);
            border-bottom: 1px solid rgba(255, 107, 53, 0.1);
        }

        .header-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 100%;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            color: var(--text-primary);
            flex-shrink: 0;
            cursor: pointer;
        }

        .logo i {
            font-size: 24px;
            background: var(--gradient-1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo span {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .logo span span {
            color: var(--primary);
        }

        .nav {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .nav button {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            transition: all 0.3s ease;
            white-space: nowrap;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav button:hover, .nav button.active {
            color: var(--text-primary);
            background: rgba(255, 107, 53, 0.15);
        }

        .nav button.active {
            color: var(--primary);
            background: rgba(255, 107, 53, 0.2);
        }

        /* Search Bar */
        .header-search {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-input-wrapper {
            position: relative;
        }

        .search-input {
            background: var(--bg-card-hover);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 8px 15px 8px 40px;
            font-size: 13px;
            color: var(--text-primary);
            width: 200px;
            transition: all 0.3s;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--primary);
            width: 250px;
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
            font-size: 14px;
        }

        .search-results-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border-radius: 12px;
            margin-top: 8px;
            max-height: 350px;
            overflow-y: auto;
            box-shadow: var(--shadow);
            display: none;
            z-index: 100;
        }

        .search-results-dropdown.show {
            display: block;
        }

        .search-result-item {
            display: flex;
            gap: 12px;
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .search-result-item:hover {
            background: var(--bg-card-hover);
        }

        .search-result-poster {
            width: 40px;
            height: 55px;
            border-radius: 6px;
            overflow: hidden;
            background: var(--bg-card-hover);
            flex-shrink: 0;
        }

        .search-result-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .search-result-info {
            flex: 1;
        }

        .search-result-info h4 {
            font-size: 13px;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .search-result-info span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .search-no-results {
            padding: 25px;
            text-align: center;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .mobile-menu-btn {
            display: none;
            background: transparent;
            border: none;
            color: var(--text-primary);
            font-size: 22px;
            cursor: pointer;
            padding: 8px;
        }

        .main {
            padding-top: var(--header-height);
            min-height: calc(100vh - var(--header-height));
        }

        /* ========== ANIME POPULER SECTION ========== */
        .popular-section {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 25px 15px;
        }

        .popular-header {
            max-width: 1400px;
            margin: 0 auto 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .popular-header i {
            color: #fbbf24;
            font-size: 24px;
        }

        .popular-header h2 {
            font-size: 20px;
            font-weight: 700;
        }

        .popular-scroll {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 10px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .popular-scroll::-webkit-scrollbar {
            height: 4px;
        }

        .popular-card {
            min-width: 160px;
            max-width: 160px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        .popular-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .popular-card-poster {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg-card-hover);
        }

        .popular-card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .popular-card-score {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.8);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .popular-card-score i {
            color: #fbbf24;
            font-size: 10px;
        }

        .popular-card-info {
            padding: 10px;
        }

        .popular-card-info h4 {
            font-size: 12px;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Hero Section */
        .hero {
            position: relative;
            height: 420px;
            overflow: hidden;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
        }

        .hero-slider {
            position: relative;
            height: 100%;
        }

        .hero-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            cursor: pointer;
        }

        .hero-slide.active {
            opacity: 1;
        }

        .hero-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            filter: blur(30px);
            transform: scale(1.1);
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, rgba(10,10,15,0.95) 0%, rgba(10,10,15,0.6) 50%, rgba(10,10,15,0.3) 100%);
        }

        .hero-content {
            position: relative;
            z-index: 10;
            max-width: 1400px;
            margin: 0 auto;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 0 20px;
        }

        .hero-info {
            max-width: 100%;
        }

        .hero-badge {
            display: inline-block;
            background: var(--gradient-1);
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .hero-title {
            font-size: 28px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
            text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        }

        .hero-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 15px;
            color: var(--text-secondary);
            font-size: 13px;
        }

        .hero-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .hero-meta i {
            color: var(--primary);
            font-size: 12px;
        }

        .hero-description {
            color: var(--text-secondary);
            font-size: 13px;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .hero-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            min-height: 44px;
            min-width: 44px;
        }

        .btn-primary {
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 107, 53, 0.4);
        }

        .btn-primary:active {
            transform: scale(0.95);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .hero-nav {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            z-index: 20;
        }

        .hero-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 0;
            border: none;
        }

        .hero-dot.active {
            background: var(--primary);
            width: 24px;
            border-radius: 4px;
        }

        /* Sections */
        .section {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 15px;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 18px;
            font-weight: 700;
        }

        .section-title i {
            color: var(--primary);
        }

        .section-link {
            color: var(--text-secondary);
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 8px 12px;
            border-radius: 15px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }

        .section-link:hover {
            color: var(--primary);
            background: rgba(255, 107, 53, 0.1);
        }

        /* Anime Grid */
        .anime-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .anime-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .anime-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow);
        }

        .anime-card:active {
            transform: scale(0.98);
        }

        .anime-card-poster {
            position: relative;
            aspect-ratio: 3/4;
            overflow: hidden;
            background: var(--bg-card-hover);
        }

        .anime-card-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .anime-card:hover .anime-card-poster img {
            transform: scale(1.05);
        }

        .anime-card-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            background: var(--primary);
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .anime-card-badge.ongoing {
            background: #22c55e;
        }

        .anime-card-badge.completed {
            background: var(--secondary);
        }

        .anime-card-rating {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0, 0, 0, 0.75);
            padding: 3px 6px;
            border-radius: 4px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .anime-card-rating i {
            color: #fbbf24;
            font-size: 9px;
        }

        .anime-card-info {
            padding: 12px 10px;
        }

        .anime-card-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: var(--text-primary);
        }

        .anime-card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            font-size: 11px;
            color: var(--text-secondary);
        }

        .anime-card-meta span {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        /* Genre Pills */
        .genre-pills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .genre-pill {
            background: var(--bg-card);
            padding: 10px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-secondary);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: pointer;
            min-height: 44px;
            display: flex;
            align-items: center;
        }

        .genre-pill:hover, .genre-pill.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .genre-pill:active {
            transform: scale(0.95);
        }

        /* Schedule */
        .schedule-container {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
        }

        .schedule-day {
            min-width: 260px;
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            scroll-snap-align: start;
            flex-shrink: 0;
        }

        .schedule-day-header {
            background: var(--gradient-1);
            padding: 12px 15px;
            font-size: 14px;
            font-weight: 600;
        }

        .schedule-day-content {
            padding: 12px;
        }

        .schedule-item {
            display: flex;
            gap: 12px;
            padding: 10px;
            border-radius: 8px;
            transition: background 0.3s;
            cursor: pointer;
            min-height: 60px;
        }

        .schedule-item:hover {
            background: var(--bg-card-hover);
        }

        .schedule-item:active {
            background: rgba(255, 107, 53, 0.2);
        }

        .schedule-item-poster {
            width: 45px;
            height: 60px;
            border-radius: 6px;
            overflow: hidden;
            flex-shrink: 0;
            background: var(--bg-card-hover);
        }

        .schedule-item-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .schedule-item-info {
            flex: 1;
            min-width: 0;
        }

        .schedule-item-info h4 {
            font-size: 12px;
            font-weight: 500;
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .schedule-item-info span {
            font-size: 11px;
            color: var(--text-secondary);
        }

        /* Pagination */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .pagination button {
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-primary);
            padding: 10px 16px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 13px;
            min-height: 44px;
            min-width: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .pagination button:hover {
            background: var(--primary);
            border-color: var(--primary);
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        /* Page Header */
        .page-header {
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-dark) 100%);
            padding: 40px 15px;
            text-align: center;
        }

        .page-header h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Detail Page */
        .detail-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px 15px;
        }

        .detail-hero {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        .detail-poster {
            width: 100%;
            max-width: 280px;
            margin: 0 auto;
        }

        .detail-poster img {
            width: 100%;
            border-radius: 12px;
            box-shadow: var(--shadow);
        }

        .detail-info {
            flex: 1;
        }

        .detail-badge {
            display: inline-block;
            background: var(--gradient-1);
            padding: 5px 12px;
            border-radius: 15px;
            font-size: 11px;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .detail-title {
            font-size: 22px;
            font-weight: 800;

<body>
    <!-- Modal Pemberitahuan -->
    <div class="modal-overlay" id="modalPemberitahuan">

                Mohon dukungan dan masukkan Anda sangat kami harapkan untuk meningkatkan kualitas layanan kami.
            </p>
            <a href="https://wa.me/6282161429908" target="_blank" class="modal-whatsapp">

            </a>

    <!-- Header - NO BLUR -->
    <header class="header">

                <i class="fas fa-play-circle"></i>

                <button class="nav-link active" onclick="navigateTo('home')">Home</button>

                <button class="nav-link" onclick="navigateTo('schedule')">Jadwal Rilis</button>
                <button class="nav-link" onclick="navigateTo('genres')">Genre</button>
            </nav>

            <!-- Search Bar -->
            <div class="header-search">
                <div class="search-input-wrapper">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" class="search-input" id="searchInput" placeholder="Cari anime..." autocomplete="off">
                    <div class="search-results-dropdown" id="searchResultsDropdown"></div>
                </div>

                <i class="fas fa-bars"></i>
            </button>

    <!-- Main Content -->
    <main class="main" id="mainContent">
        <!-- Content will be loaded dynamically -->
    </main>

    <!-- Mobile Bottom Navigation -->

        <div class="mobile-nav-items">
            <button class="mobile-nav-item active" onclick="navigateTo('home')">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </button>

            </button>
            <button class="mobile-nav-item" onclick="navigateTo('schedule')">
                <i class="fas fa-calendar"></i>
                <span>Jadwal</span>
            </button>

                <i class="fas fa-tags"></i>
                <span>Genre</span>
            </button>
        </div>
    </nav>

    <!-- Toast -->
    <div class="toast" id="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Pesan notifikasi</span>
    </div>

    <script>
        // API Base URL
        const API_BASE = 'https://www.sankavollerei.web.id/anime';

        // Current State
        let currentPage = 'home';
        let page = 1;
        let homeData = null;
        let popularAnime = [];
        let searchTimeout = null;
        let currentSlide = 0;
        let heroInterval = null;
        let currentStreamUrl = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            tampilkanModal();
            loadHome();
            setupSearch();
        });

        // Modal Pemberitahuan
        function tampilkanModal() {
            document.getElementById('modalPemberitahuan').classList.remove('hidden');
        }

        function tutupModal() {
            document.getElementById('modalPemberitahuan').classList.add('hidden');
        }

        // Navigate To
        function navigateTo(pageName) {
            switch(pageName) {
                case 'home':
                    loadHome();
                    break;
                case 'ongoing':
                    showOngoing();
                    break;
                case 'completed':
                    showCompleted();
                    break;
                case 'schedule':
                    showSchedule();
                    break;
                case 'genres':
                    showGenres();
                    break;
                default:
                    loadHome();
            }
        }

        // Update Navigation Active State
        function updateNav(pageName) {
            currentPage = pageName;
            
            document.querySelectorAll('.nav-link').forEach(link => {
                link.classList.remove('active');
                if (link.textContent.trim().toLowerCase() === pageName.toLowerCase() || 
                    (pageName === 'home' && link.textContent.trim() === 'Home')) {
                    link.classList.add('active');
                }
            });

            document.querySelectorAll('.mobile-nav-item').forEach(item => {
                item.classList.remove('active');
                const onclick = item.getAttribute('onclick');
                if (onclick && onclick.includes(pageName)) {
                    item.classList.add('active');
                }
            });
        }

        // Setup Search
        function setupSearch() {
            const searchInput = document.getElementById('searchInput');
            const dropdown = document.getElementById('searchResultsDropdown');

            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.trim();
                clearTimeout(searchTimeout);
                
                if (query.length < 2) {
                    dropdown.classList.remove('show');
                    return;
                }

                searchTimeout = setTimeout(() => {
                    searchAnime(query);
                }, 500);
            });

            searchInput.addEventListener('focus', () => {
                if (searchInput.value.length >= 2) {
                    dropdown.classList.add('show');
                }
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-input-wrapper')) {
                    dropdown.classList.remove('show');
                }
            });
        }

        // Search Anime
        async function searchAnime(query) {
            const dropdown = document.getElementById('searchResultsDropdown');
            
            try {
                const response = await fetch(`${API_BASE}/search/${encodeURIComponent(query)}`);
                const data = await response.json();
                
                if (data.ok && data.data && data.data.animeList && data.data.animeList.length > 0) {
                    let html = '';
                    data.data.animeList.forEach(anime => {
                        html += `
                            <div class="search-result-item" onclick="goToAnime('${anime.animeId}'); dropdown.classList.remove('show');">
                                <div class="search-result-poster">
                                    <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/40x55/141420/a0a0b0?text=No'">
                                </div>
                                <div class="search-result-info">
                                    <h4>${anime.title}</h4>
                                    <span>${anime.status || ''} ${anime.score ? '• ' + anime.score : ''}</span>
                                </div>
                            </div>
                        `;
                    });
                    dropdown.innerHTML = html;
                } else {
                    dropdown.innerHTML = '<div class="search-no-results">Tidak ada hasil ditemukan</div>';
                }
                
                dropdown.classList.add('show');
            } catch (error) {
                console.error('Search error:', error);
                dropdown.innerHTML = '<div class="search-no-results">Terjadi kesalahan</div>';
                dropdown.classList.add('show');
            }
        }

        // Fetch Data
        async function fetchAPI(endpoint) {
            try {
                const response = await fetch(`${API_BASE}${endpoint}`);
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('API Error:', error);
                return { ok: false, message: 'Terjadi kesalahan koneksi' };
            }
        }

        // Load Home
        async function loadHome() {
            updateNav('home');
            showLoading();

            const data = await fetchAPI('/home');
            
            if (data.ok) {
                homeData = data.data;
                
                // Get popular anime (sort by score from completed)
                popularAnime = [];
                if (data.data.completed && data.data.completed.animeList) {
                    popularAnime = [...data.data.completed.animeList]
                        .filter(a => a.score && parseFloat(a.score) > 0)
                        .sort((a, b) => parseFloat(b.score) - parseFloat(a.score))
                        .slice(0, 10);
                }
                
                renderHome(data.data);
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Setup Hero Slider
        function setupHeroSlider(animeList) {
            if (heroInterval) clearInterval(heroInterval);
            currentSlide = 0;

            heroInterval = setInterval(() => {
                currentSlide = (currentSlide + 1) % animeList.length;
                updateHeroSlide(currentSlide, animeList);
            }, 5000);
        }

        // Update Hero Slide
        function updateHeroSlide(index, animeList) {
            const dots = document.querySelectorAll('.hero-dot');
            const slides = document.querySelectorAll('.hero-slide');
            const heroTitle = document.getElementById('heroTitle');
            const heroMeta = document.querySelector('.hero-meta');
            const heroActions = document.querySelector('.hero-actions');

            dots.forEach(dot => dot.classList.remove('active'));
            slides.forEach(slide => slide.classList.remove('active'));

            if (dots[index]) dots[index].classList.add('active');
            if (slides[index]) slides[index].classList.add('active');

            if (animeList && animeList[index]) {
                const anime = animeList[index];
                if (heroTitle) heroTitle.textContent = anime.title;
                if (heroMeta) {
                    heroMeta.innerHTML = `
                        <span><i class="fas fa-film"></i> ${anime.episodes} Episode</span>
                        <span><i class="fas fa-clock"></i> ${anime.releaseDay}</span>
                        <span><i class="fas fa-calendar"></i> ${anime.latestReleaseDate}</span>
                    `;
                }
                if (heroActions) {
                    heroActions.innerHTML = `
                        <button class="btn btn-primary" onclick="goToAnime('${anime.animeId}')">
                            <i class="fas fa-play"></i> Lihat Detail
                        </button>
                    `;
                }
            }
        }

        // Render Anime Card
        function renderAnimeCard(anime) {
            const status = anime.status || '';
            const badge = status === 'Ongoing' ? 'ongoing' : 'completed';
            const badgeText = badge === 'ongoing' ? 'Ongoing' : 'Tamat';
            const animeId = anime.animeId || anime.slug || '';
            
            return `
                <div class="anime-card" onclick="goToAnime('${animeId}')">
                    <div class="anime-card-poster">
                        <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/180x240/141420/a0a0b0?text=No+Image'">
                        <span class="anime-card-badge ${badge}">${badgeText}</span>
                        ${anime.score ? `<span class="anime-card-rating"><i class="fas fa-star"></i> ${anime.score}</span>` : ''}
                    </div>
                    <div class="anime-card-info">
                        <h3 class="anime-card-title">${anime.title}</h3>
                        <div class="anime-card-meta">
                            <span><i class="fas fa-film"></i> ${anime.episodes || '?'} Ep</span>
                            ${anime.releaseDay ? `<span><i class="fas fa-calendar"></i> ${anime.releaseDay}</span>` : ''}
                        </div>
                    </div>
                </div>
            `;
        }

        // Show Ongoing Anime
        async function showOngoing() {
            updateNav('ongoing');

                renderAnimeListPage(data.data.animeList, 'Anime Sedang Tayang');

                showError(data.message || 'Gagal memuat data');
            }

        // Show Completed Anime
        async function showCompleted() {
            updateNav('completed');
            showLoading();

            const data = await fetchAPI('/complete-anime?page=1');
            
            if (data.ok) {
                renderAnimeListPage(data.data.animeList, 'Anime Tamat');
            } else {
                showError(data.message || 'Gagal memuat data');
            }
        }

        // Show Schedule
        async function showSchedule() {
            updateNav('schedule');
            showLoading();

            const data = await fetchAPI('/schedule');
            
            let scheduleData = null;
            
            if (data.status === 'success' && Array.isArray(data.data)) {
                scheduleData = data.data;
            } else if (data.ok && data.data && Array.isArray(data.data)) {
                scheduleData = data.data;
            } else if (Array.isArray(data.data)) {
                scheduleData = data.data;
            }
            
            if (scheduleData && scheduleData.length > 0) {
                renderSchedule(scheduleData);
            } else {
                showError('Gagal memuat jadwal rilis. Silakan coba lagi.');
            }
        }

        // Render Schedule
        function renderSchedule(schedule) {
            const mainContent = document.getElementById('mainContent');
            
            const dayOrder = ['Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu', 'Minggu'];
            const sortedSchedule = [...schedule].sort((a, b) => 
                dayOrder.indexOf(a.day) - dayOrder.indexOf(b.day)
            );

            const today = new Date();
            const todayDay = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'][today.getDay()];

            let html = `
                <section class="page-header">
                    <h1><i class="fas fa-calendar-alt"></i> Jadwal Rilis Anime</h1>
                    <p>Daftar anime yang dirilis setiap harinya</p>
                </section>
                <section class="section" style="padding-top: 0;">
                    <div class="schedule-container">
                        ${sortedSchedule.map(day => `
                            <div class="schedule-day" ${day.day === todayDay ? 'style="border: 2px solid var(--primary);"' : ''}>
                                <div class="schedule-day-header">
                                    ${day.day} ${day.day === todayDay ? '(Hari Ini)' : ''}
                                </div>
                                <div class="schedule-day-content">
                                    ${day.anime_list && day.anime_list.length > 0 ? day.anime_list.map(anime => `
                                        <div class="schedule-item" onclick="goToAnime('${anime.slug}')">
                                            <div class="schedule-item-poster">
                                                <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/45x60/141420/a0a0b0?text=No'">
                                            </div>
                                            <div class="schedule-item-info">
                                                <h4>${anime.title}</h4>
                                                <span>Klik untuk detail</span>
                                            </div>
                                        </div>
                                    `).join('') : '<p style="padding:10px;color:var(--text-secondary);font-size:12px;">Tidak ada anime</p>'}
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
        }

        // Show Genres
        async function showGenres() {
            updateNav('genres');

            const data = await fetchAPI('/genre');

        // Render Anime List Page

        // Go to Anime Detail
        async function goToAnime(animeId) {
            if (!animeId) {
                showError('ID anime tidak ditemukan');
                return;
            }
            
            showLoading();

            const data = await fetchAPI(`/anime/${animeId}`);
            
            if (data.ok && data.data) {
                renderAnimeDetail(data.data);
            } else {
                showError(data.message || 'Anime tidak ditemukan');
            }
        }

        // Render Anime Detail
        function renderAnimeDetail(anime) {
            const mainContent = document.getElementById('mainContent');
            
            let synopsis = '';
            if (anime.synopsis && anime.synopsis.paragraphs) {
                synopsis = anime.synopsis.paragraphs.join('<br><br>');
            }

            let batchHtml = '';
            if (anime.batch && anime.batch.length > 0) {
                batchHtml = `
                    <div class="batch-download">
                        <h3><i class="fas fa-download"></i> Download Batch</h3>
                        <div class="batch-links">
                            ${anime.batch.map(batch => `
                                <a href="${batch.url}" target="_blank" class="batch-link">

                                </a>

                        </div>
                    </div>
                `;
            }

            let html = `
                <section class="detail-container">
                    <div class="detail-hero">
                        <div class="detail-poster">
                            <img src="${anime.poster}" alt="${anime.title}" onerror="this.src='https://via.placeholder.com/280x400/141420/a0a0b0?text=No+Image'">
                        </div>
                        <div class="detail-info">
                            <span class="detail-badge">${anime.status}</span>
                            <h1 class="detail-title">${anime.title}</h1>
                            ${anime.japanese ? `<p class="detail-title-jp">${anime.japanese}</p>` : ''}
                            
                            <div class="detail-meta">
                                ${anime.type ? `<div class="detail-meta-item"><i class="fas fa-tv"></i> ${anime.type}</div>` : ''}
                                ${anime.episodes ? `<div class="detail-meta-item"><i class="fas fa-film"></i> ${anime.episodes} Episode</div>` : ''}
                                ${anime.duration ? `<div class="detail-meta-item"><i class="fas fa-clock"></i> ${anime.duration}</div>` : ''}
                                ${anime.aired ? `<div class="detail-meta-item"><i class="fas fa-calendar"></i> ${anime.aired}</div>` : ''}
                                ${anime.score ? `<div class="detail-meta-item"><i class="fas fa-star"></i> ${anime.score}</div>` : ''}
                            </div>

                            ${anime.producers ? `<div class="detail-meta"><div class="detail-meta-item"><i class="fas fa-industry"></i> ${anime.producers}</div></div>` : ''}
                            ${anime.studios ? `<div class="detail-meta"><div class="detail-meta-item"><i class="fas fa-building"></i> ${anime.studios}</div></div>` : ''}

                            <div class="detail-genres">
                                ${anime.genreList.map(genre => `
                                    <button class="detail-genre" onclick="showGenreAnime('${genre.genreId}', '${genre.title}')">
                                        ${genre.title}
                                    </button>
                                `).join('')}
                            </div>

                            ${synopsis ? `
                                <div class="detail-synopsis">
                                    <h3><i class="fas fa-book-open"></i> Sinopsis</h3>
                                    <p>${synopsis}</p>
                                </div>
                            ` : ''}

                            <div class="hero-actions">
                                ${anime.episodeList && anime.episodeList.length > 0 ? `
                                    <button class="btn btn-primary" onclick="goToEpisode('${anime.episodeList[0].episodeId}')">
                                        <i class="fas fa-play"></i> Nonton Episode 1
                                    </button>
                                ` : ''}
                                <button class="btn btn-secondary" onclick="window.scrollTo({ top: 0, behavior: 'smooth' });">
                                    <i class="fas fa-arrow-up"></i> Ke Atas
                                </button>
                            </div>
                        </div>
                    </div>

                    ${anime.episodeList && anime.episodeList.length > 0 ? `
                        <div class="episode-list">
                            <h3><i class="fas fa-list"></i> Daftar Episode (${anime.episodeList.length})</h3>
                            <div class="episode-grid">
                                ${anime.episodeList.map(ep => `
                                    <div class="episode-item" onclick="goToEpisode('${ep.episodeId}')">
                                        <div class="episode-number">${ep.eps}</div>
                                        <div class="episode-info">
                                            <h4>Episode ${ep.eps}</h4>
                                            <span>${ep.date}</span>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}

                    ${batchHtml}

                    ${anime.recommendedAnimeList && anime.recommendedAnimeList.length > 0 ? `
                        <section class="section" style="padding-top: 0;">
                            <div class="section-header">
                                <h2 class="section-title"><i class="fas fa-thumbs-up"></i> Rekomendasi</h2>
                            </div>
                            <div class="anime-grid recommended-grid">

        // Go to Episode
        async function goToEpisode(episodeId) {
            if (!episodeId) {
                showError('ID episode tidak ditemukan');
                return;
            }
            
            showLoading();

            const data = await fetchAPI(`/episode/${episodeId}`);
            
            if (data.ok && data.data) {
                renderEpisode(data.data);
            } else {
                showError(data.message || 'Episode tidak ditemukan');
            }
        }

        // Render Episode Page
        function renderEpisode(episode) {
            const mainContent = document.getElementById('mainContent');
            currentStreamUrl = episode.defaultStreamingUrl || null;
            
            let serverHtml = '<div class="server-section">';
            if (episode.server && episode.server.qualities) {
                episode.server.qualities.forEach(quality => {
                    serverHtml += `
                        <div class="server-quality">
                            <h4>${quality.title}</h4>
                            <div class="server-buttons">
                                ${quality.serverList.map((server) => `
                                    <button class="server-btn" onclick="loadServer('${server.serverId}', '${server.title.trim()}', '${quality.title}')">
                                        <i class="fas fa-play-circle"></i> ${server.title.trim()}
                                    </button>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            }
            serverHtml += '</div>';

            let downloadHtml = '<div class="download-section">';
            if (episode.downloadUrl && episode.downloadUrl.qualities) {
                episode.downloadUrl.qualities.forEach(quality => {
                    downloadHtml += `
                        <div class="download-quality">
                            <div class="download-quality-header">
                                <h4>${quality.title}</h4>
                                <span>${quality.size}</span>
                            </div>
                            <div class="download-links">
                                ${quality.urls.map(url => `
                                    <a href="${url.url}" target="_blank" class="download-btn">
                                        <i class="fas fa-download"></i> ${url.title}
                                    </a>
                                `).join('')}
                            </div>
                        </div>
                    `;
                });
            }
            downloadHtml += '</div>';

            let prevBtn = episode.hasPrevEpisode ? 
                `<button class="episode-nav-btn" onclick="goToEpisode('${episode.prevEpisode.episodeId}')">
                    <i class="fas fa-chevron-left"></i> Prev
                </button>` : 
                `<span class="episode-nav-btn disabled"><i class="fas fa-chevron-left"></i> Prev</span>`;

            let nextBtn = episode.hasNextEpisode ?
                `<button class="episode-nav-btn" onclick="goToEpisode('${episode.nextEpisode.episodeId}')">
                    Next <i class="fas fa-chevron-right"></i>
                </button>` :
                `<span class="episode-nav-btn disabled">Next <i class="fas fa-chevron-right"></i></span>`;

            let html = `
                <section class="episode-page">
                    <div class="episode-nav">
                        ${prevBtn}
                        <button class="episode-nav-btn home-btn" onclick="goToAnime('${episode.animeId}')">
                            <i class="fas fa-list"></i> Daftar Episode
                        </button>
                        ${nextBtn}
                    </div>

                    <div class="episode-player">
                        <div class="video-container" id="videoContainer">
                            ${currentStreamUrl ? `
                                <iframe src="${currentStreamUrl}" allowfullscreen style="width:100%;height:100%;border:none;"></iframe>
                            ` : `
                                <div class="video-placeholder">
                                    <i class="fas fa-film"></i>
                                    <h3>Pilih Server Streaming</h3>
                                    <p>Klik tombol "Tonton Sekarang" di bawah atau pilih server untuk mulai menonton</p>
                                </div>
                            `}
                        </div>
                        
                        <div class="watch-btn-container">
                            <button class="watch-btn-large" id="watchBtn">
                                <i class="fas fa-play"></i> Tonton Sekarang
                            </button>
                        </div>

                        ${serverHtml}
                        ${downloadHtml}
                    </div>
                </section>
            `;

            mainContent.innerHTML = html + renderFooter();
            window.scrollTo({ top: 0, behavior: 'smooth' });

            document.getElementById('watchBtn').addEventListener('click', () => {
                if (currentStreamUrl) {
                    window.open(currentStreamUrl, '_blank');
                } else {
                    const firstServer = document.querySelector('.server-btn');
                    if (firstServer) {
                        firstServer.click();
                    }
                }
            });
        }

        // Load Server
        async function loadServer(serverId, serverName, quality) {
            showToast(`Loading ${serverName} (${quality})...`);
            
            const data = await fetchAPI(`/server/${serverId}`);
            
            if (data.ok && data.data && data.data.url) {
                const videoContainer = document.getElementById('videoContainer');
                const watchBtn = document.getElementById('watchBtn');
                
                videoContainer.innerHTML = `<iframe src="${data.data.url}" allowfullscreen style="width:100%;height:100%;border:none;"></iframe>`;
                
                if (watchBtn) {
                    watchBtn.innerHTML = '<i class="fas fa-external-link-alt"></i> Buka di Tab Baru';
                    watchBtn.onclick = () => window.open(data.data.url, '_blank');
                }
                
                currentStreamUrl = data.data.url;
                showToast(`${serverName} (${quality}) siap ditonton`);
            } else {
                showToast('Gagal memuat server');
            }
        }

        // Show Loading
        function showLoading() {
            document.getElementById('mainContent').innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>Memuat data...</p>
                </div>
            `;
        }

        // Show Error
        function showError(message) {
            document.getElementById('mainContent').innerHTML = `
                <div class="error-message">
